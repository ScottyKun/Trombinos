<div class="card" style="width: 18rem;">
<img src={{personnel.photo}} class="card-img-top" alt="...">
<div class="card-body">
<h5 class="card-title">Nom: {{personnel.nom}} {{personnel.prenom}}</h5>
<p class="card-text">Informations personnelles</p>
</div>
<ul class="list-group list-group-flush">
<li class="list-group-item">Email: {{personnel.email}}</li>
<li class="list-group-item">Telephone: {{personnel.telephone}}</li>
<li class="list-group-item">Bureau: {{personnel.bureau}}</li>
<li class="list-group-item">Service: {{personnel.service}}</li>
<li class="list-group-item">
    <a href="{{personnel.compte_X}}" target="_blank">X</a>
</li>
</ul>
</div>
