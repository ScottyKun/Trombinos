<form #etudiantForm="ngForm">
  <div class="mb-3">
    <label for="nomEtudiant" class="form-label">Nom</label>
    <input type="text" class="form-control" id="nomEtudiant" [(ngModel)]="etudiant.nom" name="nom">
  </div>
  <div class="mb-3">
    <label for="prenomEtudiant" class="form-label">Prénom</label>
    <input type="text" class="form-control" id="prenomEtudiant" [(ngModel)]="etudiant.prenom" name="prenom">
  </div>
  <div class="mb-3">
    <label for="emailEtudiant" class="form-label">Email</label>
    <input type="email" class="form-control" id="emailEtudiant" [(ngModel)]="etudiant.email" name="email">
  </div>
  <div class="mb-3">
    <label for="telephoneEtudiant" class="form-label">Téléphone</label>
    <input type="tel" class="form-control" id="telephoneEtudiant" [(ngModel)]="etudiant.telephone" name="telephone">
  </div>
  <div class="mb-3">
    <label for="linkedinEtudiant" class="form-label">Lien vers LinkedIn</label>
    <input type="url" class="form-control" id="linkedinEtudiant" [(ngModel)]="etudiant.linkedin" name="linkedin">
  </div>
  <div class="mb-3">
    <label for="alumniEtudiant" class="form-label">Lien vers Alumni</label>
    <input type="url" class="form-control" id="alumniEtudiant" [(ngModel)]="etudiant.alumni" name="alumni">
  </div>
  <button type="submit" class="btn btn-primary" (click)="add()">Soumettre</button>
</form>
